name: rakshak
description: AI Safety Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # Location Services (mobile only — guarded with kIsWeb on web)
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0

  # Maps (flutter_map works on all platforms including web)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Storage
  shared_preferences: ^2.2.2

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
